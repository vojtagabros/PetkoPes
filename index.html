<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petko - Dog Walk Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5ebe0;
            color: #3d2c2e;
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #a47148, #c8956c);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            letter-spacing: 1px;
        }

        .header p {
            color: #f5ebe0;
            font-size: 14px;
            margin-top: 4px;
        }

        /* Timer section */
        .timer-section {
            background: #fff;
            margin: 16px;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .timer-display {
            font-size: 48px;
            font-weight: 700;
            color: #a47148;
            font-variant-numeric: tabular-nums;
            margin: 16px 0;
        }

        .timer-label {
            font-size: 14px;
            color: #8a7060;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-start {
            background: linear-gradient(135deg, #6b8f4a, #8ab560);
            color: #fff;
        }

        .btn-pause {
            background: linear-gradient(135deg, #c8956c, #a47148);
            color: #fff;
        }

        .btn-stop {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: #fff;
        }

        .btn-resume {
            background: linear-gradient(135deg, #6b8f4a, #8ab560);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* Notes input */
        .notes-input {
            width: 100%;
            margin-top: 16px;
            padding: 12px 16px;
            border: 2px solid #e6d5c3;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: #faf6f1;
            color: #3d2c2e;
            resize: none;
        }

        .notes-input::placeholder {
            color: #b8a090;
        }

        .notes-input:focus {
            outline: none;
            border-color: #a47148;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 12px;
            margin: 0 16px;
        }

        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #a47148;
        }

        .stat-label {
            font-size: 12px;
            color: #8a7060;
            margin-top: 4px;
        }

        /* History */
        .history-section {
            margin: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h2 {
            font-size: 20px;
            color: #3d2c2e;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #c0392b;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .walk-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .walk-card {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .walk-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e6d5c3, #f5ebe0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .walk-info {
            flex: 1;
            min-width: 0;
        }

        .walk-date {
            font-size: 13px;
            color: #8a7060;
        }

        .walk-duration {
            font-size: 18px;
            font-weight: 600;
            color: #a47148;
        }

        .walk-notes {
            font-size: 13px;
            color: #6b5b50;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .walk-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }

        .walk-edit, .walk-delete {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            opacity: 0.5;
        }

        .walk-edit {
            color: #a47148;
        }

        .walk-delete {
            color: #c0392b;
        }

        .walk-edit:hover, .walk-delete:hover {
            opacity: 1;
        }

        .edit-form {
            text-align: left;
        }

        .edit-form .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .edit-form .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .edit-form label {
            font-size: 12px;
            color: #8a7060;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal.edit-modal {
            max-width: 360px;
            text-align: left;
        }

        .modal.edit-modal h3 {
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: #b8a090;
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        /* Add walk form */
        .add-walk-section {
            background: #fff;
            margin: 16px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .add-walk-section h2 {
            font-size: 18px;
            color: #3d2c2e;
            margin-bottom: 14px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            color: #8a7060;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            padding: 10px 12px;
            border: 2px solid #e6d5c3;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: #faf6f1;
            color: #3d2c2e;
        }

        .form-input:focus {
            outline: none;
            border-color: #a47148;
        }

        .btn-add {
            background: linear-gradient(135deg, #a47148, #c8956c);
            color: #fff;
            width: 100%;
            margin-top: 4px;
        }

        /* Bottom padding for mobile */
        .bottom-spacer {
            height: 40px;
        }

        /* Confirm dialog */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            margin: 20px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal h3 {
            margin-bottom: 8px;
            color: #3d2c2e;
        }

        .modal p {
            color: #8a7060;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn {
            flex: 1;
            padding: 12px;
        }

        .btn-cancel {
            background: #e6d5c3;
            color: #3d2c2e;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Petko</h1>
        <p>Dog Walk Tracker</p>
    </div>

    <div class="timer-section">
        <div class="timer-label">Walk Duration</div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-buttons" id="timerButtons">
            <button class="btn btn-start" id="btnStart" onclick="startTimer()">Start Walk</button>
        </div>
        <input class="notes-input" id="walkName" placeholder="Walk name (e.g. Evening park loop)" style="margin-top:16px">
        <textarea class="notes-input" id="walkNotes" placeholder="Notes (optional)" rows="2" style="margin-top:8px"></textarea>
    </div>

    <div class="add-walk-section">
        <h2>Add Past Walk</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" class="form-input" id="manualDate">
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" class="form-input" id="manualTime">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Duration (min)</label>
                <input type="number" class="form-input" id="manualDuration" min="1" placeholder="30">
            </div>
        </div>
        <div class="form-group">
            <label>Name</label>
            <input class="form-input" id="manualName" placeholder="Walk name">
        </div>
        <div class="form-group" style="margin-top:10px">
            <label>Notes</label>
            <textarea class="form-input" id="manualNotes" placeholder="Notes (optional)" rows="2" style="resize:none"></textarea>
        </div>
        <button class="btn btn-add" onclick="addManualWalk()">Add Walk</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalWalks">0</div>
            <div class="stat-label">Total Walks</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalTime">0m</div>
            <div class="stat-label">Total Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="thisWeek">0</div>
            <div class="stat-label">This Week</div>
        </div>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h2>Walk History</h2>
            <button class="clear-btn" onclick="showClearConfirm()">Clear All</button>
        </div>
        <div class="walk-list" id="walkList"></div>
    </div>

    <div class="bottom-spacer"></div>

    <!-- Clear confirm modal -->
    <div class="modal-overlay" id="clearModal">
        <div class="modal">
            <h3>Clear All Walks?</h3>
            <p>This will permanently delete your entire walk history.</p>
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="hideClearConfirm()">Cancel</button>
                <button class="btn btn-stop" onclick="clearAllWalks()">Delete All</button>
            </div>
        </div>
    </div>

    <!-- Edit walk modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal edit-modal">
            <h3>Edit Walk</h3>
            <div class="edit-form">
                <div class="form-group" style="margin-bottom:10px">
                    <label>Name</label>
                    <input class="form-input" id="editName" placeholder="Walk name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" class="form-input" id="editDate">
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" class="form-input" id="editTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Duration (min)</label>
                        <input type="number" class="form-input" id="editDuration" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea class="form-input" id="editNotes" rows="2" style="resize:none"></textarea>
                </div>
            </div>
            <div class="modal-buttons" style="margin-top:16px">
                <button class="btn btn-cancel" onclick="hideEditModal()">Cancel</button>
                <button class="btn btn-add" style="width:auto" onclick="saveEditWalk()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let startTime = null;
        let elapsed = 0;
        let timerState = 'stopped'; // stopped, running, paused

        const STORAGE_KEY = 'petko_walks';

        // Timer functions
        function startTimer() {
            timerState = 'running';
            startTime = Date.now() - elapsed;
            timerInterval = setInterval(updateDisplay, 1000);
            renderButtons();
        }

        function pauseTimer() {
            timerState = 'paused';
            clearInterval(timerInterval);
            elapsed = Date.now() - startTime;
            renderButtons();
        }

        function resumeTimer() {
            timerState = 'running';
            startTime = Date.now() - elapsed;
            timerInterval = setInterval(updateDisplay, 1000);
            renderButtons();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            const duration = Math.floor(elapsed / 1000);
            elapsed = 0;
            timerState = 'stopped';

            if (duration >= 5) {
                saveWalk({
                    duration: duration,
                    name: document.getElementById('walkName').value.trim(),
                    notes: document.getElementById('walkNotes').value.trim(),
                    date: new Date().toISOString()
                });
            }

            document.getElementById('timerDisplay').textContent = '00:00:00';
            document.getElementById('walkName').value = '';
            document.getElementById('walkNotes').value = '';
            renderButtons();
        }

        function updateDisplay() {
            elapsed = Date.now() - startTime;
            const totalSec = Math.floor(elapsed / 1000);
            const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
            const s = String(totalSec % 60).padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
        }

        function renderButtons() {
            const container = document.getElementById('timerButtons');
            if (timerState === 'stopped') {
                container.innerHTML = '<button class="btn btn-start" onclick="startTimer()">Start Walk</button>';
            } else if (timerState === 'running') {
                container.innerHTML = `
                    <button class="btn btn-pause" onclick="pauseTimer()">Pause</button>
                    <button class="btn btn-stop" onclick="stopTimer()">Finish</button>
                `;
            } else {
                container.innerHTML = `
                    <button class="btn btn-resume" onclick="resumeTimer()">Resume</button>
                    <button class="btn btn-stop" onclick="stopTimer()">Finish</button>
                `;
            }
        }

        // Data functions
        function getWalks() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveWalk({ duration, name, notes, date }) {
            const walks = getWalks();
            walks.unshift({
                id: Date.now(),
                date: date,
                duration: duration,
                name: name || '',
                notes: notes || ''
            });
            walks.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(walks));
            renderHistory();
            renderStats();
        }

        function addManualWalk() {
            const dateVal = document.getElementById('manualDate').value;
            const timeVal = document.getElementById('manualTime').value;
            const duration = parseInt(document.getElementById('manualDuration').value);
            const name = document.getElementById('manualName').value.trim();
            const notes = document.getElementById('manualNotes').value.trim();

            if (!dateVal || !duration || duration < 1) {
                alert('Please fill in at least the date and duration.');
                return;
            }

            const dateStr = timeVal ? `${dateVal}T${timeVal}` : `${dateVal}T12:00`;
            const date = new Date(dateStr).toISOString();

            saveWalk({ duration: duration * 60, name, notes, date });

            document.getElementById('manualDate').value = '';
            document.getElementById('manualTime').value = '';
            document.getElementById('manualDuration').value = '';
            document.getElementById('manualName').value = '';
            document.getElementById('manualNotes').value = '';
        }

        function deleteWalk(id) {
            const walks = getWalks().filter(w => w.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(walks));
            renderHistory();
            renderStats();
        }

        function clearAllWalks() {
            localStorage.removeItem(STORAGE_KEY);
            renderHistory();
            renderStats();
            hideClearConfirm();
        }

        function showClearConfirm() {
            document.getElementById('clearModal').classList.add('active');
        }

        function hideClearConfirm() {
            document.getElementById('clearModal').classList.remove('active');
        }

        // Edit walk
        let editingWalkId = null;

        function openEditModal(id) {
            const walk = getWalks().find(w => w.id === id);
            if (!walk) return;
            editingWalkId = id;
            const d = new Date(walk.date);
            document.getElementById('editName').value = walk.name || '';
            document.getElementById('editDate').value = d.toISOString().slice(0, 10);
            document.getElementById('editTime').value = d.toTimeString().slice(0, 5);
            document.getElementById('editDuration').value = Math.round(walk.duration / 60);
            document.getElementById('editNotes').value = walk.notes || '';
            document.getElementById('editModal').classList.add('active');
        }

        function hideEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingWalkId = null;
        }

        function saveEditWalk() {
            if (editingWalkId === null) return;
            const walks = getWalks();
            const idx = walks.findIndex(w => w.id === editingWalkId);
            if (idx === -1) return;

            const dateVal = document.getElementById('editDate').value;
            const timeVal = document.getElementById('editTime').value;
            const duration = parseInt(document.getElementById('editDuration').value);

            if (!dateVal || !duration || duration < 1) {
                alert('Please fill in at least the date and duration.');
                return;
            }

            const dateStr = timeVal ? `${dateVal}T${timeVal}` : `${dateVal}T12:00`;
            walks[idx].date = new Date(dateStr).toISOString();
            walks[idx].duration = duration * 60;
            walks[idx].name = document.getElementById('editName').value.trim();
            walks[idx].notes = document.getElementById('editNotes').value.trim();

            walks.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(walks));
            hideEditModal();
            renderHistory();
            renderStats();
        }

        // Format duration
        function formatDuration(sec) {
            if (sec < 60) return `${sec}s`;
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }

        function formatDate(iso) {
            const d = new Date(iso);
            const now = new Date();
            const diff = now - d;
            const days = Math.floor(diff / 86400000);

            if (days === 0) {
                return 'Today, ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (days === 1) {
                return 'Yesterday, ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (days < 7) {
                return d.toLocaleDateString([], { weekday: 'long' }) + ', ' +
                       d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' +
                   d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Render
        function renderHistory() {
            const walks = getWalks();
            const container = document.getElementById('walkList');

            if (walks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🐾</div>
                        <p>No walks yet. Start your first walk!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = walks.map(w => `
                <div class="walk-card">
                    <div class="walk-icon">🐕</div>
                    <div class="walk-info">
                        ${w.name ? `<div class="walk-name" style="font-weight:600;font-size:15px;color:#3d2c2e">${escapeHtml(w.name)}</div>` : ''}
                        <div class="walk-date">${formatDate(w.date)}</div>
                        <div class="walk-duration">${formatDuration(w.duration)}</div>
                        ${w.notes ? `<div class="walk-notes">${escapeHtml(w.notes)}</div>` : ''}
                    </div>
                    <div class="walk-actions">
                        <button class="walk-edit" onclick="openEditModal(${w.id})" title="Edit">&#9998;</button>
                        <button class="walk-delete" onclick="deleteWalk(${w.id})" title="Delete">&times;</button>
                    </div>
                </div>
            `).join('');
        }

        function renderStats() {
            const walks = getWalks();
            const totalMin = Math.round(walks.reduce((sum, w) => sum + w.duration, 0) / 60);
            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            weekStart.setHours(0, 0, 0, 0);
            const thisWeek = walks.filter(w => new Date(w.date) >= weekStart).length;

            document.getElementById('totalWalks').textContent = walks.length;
            document.getElementById('totalTime').textContent = totalMin >= 60
                ? `${Math.floor(totalMin / 60)}h ${totalMin % 60}m`
                : `${totalMin}m`;
            document.getElementById('thisWeek').textContent = thisWeek;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Init
        renderHistory();
        renderStats();
    </script>
</body>
</html>
